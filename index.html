<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Scroll & Sword</title>
  <link rel="stylesheet" href="./styles.css?v=23b" />
</head>

<body>
  <main id="app" class="app">
    <header class="topbar">
      <h1>⚔️ Scroll & Sword</h1>
      <div class="stats" style="display:none;">
        <span class="hp-badge">❤️ <b id="hp">10</b></span>
        <span id="stepBadge" class="step-badge">1/20</span>
      </div>
    </header>

    <!-- Main Menu -->
    <section id="menu" class="screen active">
      <div class="menu-hero">
        <div class="menu-icon">⚔️</div>
        <h2 class="menu-title">Scroll & Sword</h2>
        <p class="menu-tagline">A 20-step dark RPG. Every choice matters.</p>
      </div>
      <button data-action="new" class="btn-primary">🗡️ New Adventure</button>
      <button data-action="load" class="btn-secondary">📜 Continue Saga</button>
      <p class="hint">Scroll to navigate • Press to select</p>
    </section>

    <!-- Theme Selection -->
    <section id="theme" class="screen">
      <h2>Choose Your World</h2>
      <button data-theme="medieval" class="btn-secondary">🏰 Medieval</button>
      <button data-theme="noir" class="btn-secondary">🔫 Noir</button>
      <button data-theme="scifi" class="btn-secondary">🚀 Sci‑Fi</button>
    </section>

    <!-- Gameplay Screen -->
    <section id="scene" class="screen">
      <div class="scene-header">
        <div id="sceneMeta" class="scene-meta"></div>
        <div id="aiStatus" class="ai-status">AI: Connecting...</div>
      </div>
      <article id="narration" class="narration"></article>
      <div id="choices" class="choices"></div>
      <div class="scene-actions">
        <button id="wheelBtn" class="fate">🎡 Wheel of Fate</button>
        <button id="backToMenuBtn" class="btn-ghost">⬅ Back</button>
      </div>
      <div id="debugLog" class="debug-log"></div>
    </section>

    <!-- Wheel of Fate -->
    <section id="wheel" class="screen">
      <h2>🎡 Wheel of Fate</h2>
      <canvas id="wheelCanvas" width="200" height="200"></canvas>
      <p id="wheelHint" class="hint">Scroll to spin, press to release</p>
      <button id="releaseBtn" class="fate">Release Fate</button>
      <button id="backToMenuFromWheelBtn" class="btn-ghost">⬅ Back</button>
    </section>

    <!-- End Screen -->
    <section id="end" class="screen">
      <div class="end-hero">
        <h2 id="endTitle">The End</h2>
        <p id="endText"></p>
        <button id="restartBtn" class="btn-primary">🔄 Play Again</button>
      </div>
    </section>
  </main>

  <!-- Save/Load Modal -->
  <div id="savesModal" class="modal" style="display:none;">
    <div class="modal-content screen">
      <h3 id="savesTitle">Select Slot</h3>
      <div id="saveSlotsContainer"></div>
      <button id="savesBackBtn" class="btn-ghost" style="margin-top: 10px;">Cancel</button>
    </div>
  </div>

  <!-- Save Confirmation Modal -->
  <div id="saveModal" class="modal" style="display:none;">
    <div class="modal-content screen">
      <h3>Save progress?</h3>
      <p class="hint" style="margin-bottom:12px;">Save before returning to menu?</p>
      <button id="modalSaveBtn" class="btn-primary">Yes, Save</button>
      <button id="modalDiscardBtn" class="btn-secondary">No, Discard</button>
      <button id="modalCancelBtn" class="btn-ghost" style="margin-top:10px;">Cancel</button>
    </div>
  </div>

  <script type="module" src="./main.js?v=23"></script>
</body>

</html>
