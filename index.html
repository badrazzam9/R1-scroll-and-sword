<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Scroll & Sword</title>
  <link rel="stylesheet" href="./styles.css?v=13" />
</head>

<body>
  <main id="app" class="app">
    <header class="topbar">
      <h1>⚔️ Scroll & Sword</h1>
      <div class="stats" style="display:none;">
        <span>HP: <b id="hp">10</b></span>
        <span>Gold: <b id="gold">0</b></span>
      </div>
    </header>

    <section id="menu" class="screen active">
      <h2>Menu</h2>
      <button data-action="new">New Game</button>
      <button data-action="load">Load Game</button>

      <div class="settings">
        <input id="seedInput" type="number" placeholder="Optional seed (e.g. 12345)" />
        <button id="saveSettingsBtn">Save Settings</button>
      </div>

      <p class="small">Scroll to move • Press to select</p>
    </section>

    <section id="theme" class="screen">
      <h2>Choose Lore Theme</h2>
      <button data-theme="medieval">Medieval</button>
      <button data-theme="noir">Modern / Retro Noir</button>
      <button data-theme="scifi">Sci‑Fi</button>
    </section>

    <section id="scene" class="screen">
      <div id="sceneMeta" class="scene-meta"></div>
      <div id="aiStatus" class="small">AI: checking...</div>
      <article id="narration" class="narration"></article>
      <div id="choices" class="choices"></div>
      <div id="debugLog" class="debug-log">Log: ...</div>
      <button id="wheelBtn" class="fate">🎡 Wheel of Fate</button>
      <button id="backToMenuBtn" class="secondary">⬅ Back to Menu</button>
    </section>

    <section id="wheel" class="screen">
      <h2>Wheel of Fate</h2>
      <canvas id="wheelCanvas" width="200" height="200"></canvas>
      <p id="wheelHint" class="small">Scroll to spin, press Fate to release</p>
      <button id="releaseBtn">Release Fate</button>
      <button id="backToMenuFromWheelBtn" class="secondary">⬅ Back to Menu</button>
    </section>

    <section id="end" class="screen">
      <h2 id="endTitle">The End</h2>
      <p id="endText"></p>
      <button id="restartBtn">Back to Menu</button>
    </section>
  </main>

  <!-- Generic Save/Load Screen Modal -->
  <div id="savesModal" class="modal" style="display:none;">
    <div class="modal-content screen">
      <h3 id="savesTitle" style="margin-top:0; text-align:center;">Select Slot</h3>
      <div id="saveSlotsContainer">
        <!-- Slots injected here via JS -->
      </div>
      <button id="savesBackBtn" class="secondary" style="margin-top: 10px;">Cancel</button>
    </div>
  </div>

  <!-- Save Confirmation Modal -->
  <div id="saveModal" class="modal" style="display:none;">
    <div class="modal-content screen">
      <h3>Save progress?</h3>
      <p class="small" style="margin-bottom:12px;">Would you like to save before returning to the menu?</p>
      <button id="modalSaveBtn">Yes, Save</button>
      <button id="modalDiscardBtn" class="secondary">No, Discard</button>
      <button id="modalCancelBtn" class="secondary" style="margin-top:10px;">Cancel</button>
    </div>
  </div>

  <script type="module" src="./main.js?v=13"></script>
</body>

</html>
